<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tesseract</title>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background: #030712;
				color: white;
				font-family: 'Segoe UI', sans-serif;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.background {
				position: fixed;
				inset: 0;
				background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15), transparent 50%);
			}

			.container {
				text-align: center;
				z-index: 2;
			}

			.logo {
				width: 180px;
				height: 180px;
				margin: 0 auto 30px;
				filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.7));
			}

			.logo svg {
				width: 100%;
				height: 100%;
			}

			.title {
				font-size: 3rem;
				letter-spacing: 0.6rem;
				font-weight: 300;
				margin-bottom: 50px;
			}

			.loader {
				width: 70px;
				height: 70px;
				border-radius: 50%;
				border: 4px solid rgba(255, 255, 255, 0.08);
				border-top: 4px solid #6366f1;
				animation: spin 1.2s linear infinite;
				margin: 0 auto 20px;
			}

			.loading-text {
				color: rgba(255, 255, 255, 0.5);
				letter-spacing: 0.3rem;
				font-size: 0.9rem;
			}

			@keyframes spin {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(360deg);
				}
			}

			/* фоновые точки */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background-image: radial-gradient(circle, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
				background-size: 60px 60px;
				opacity: 0.15;
			}
		</style>
	</head>

	<body>
		<div class="background"></div>

		<div class="container">
			<div class="logo">
				<svg viewBox="0 0 100 100" fill="none" stroke="#7c3aed" stroke-width="2">
					<path d="M30 20 L70 20 L70 60 L30 60 Z" />
					<path d="M40 30 L80 30 L80 70 L40 70 Z" />
					<path d="M30 20 L40 30" />
					<path d="M70 20 L80 30" />
					<path d="M70 60 L80 70" />
					<path d="M30 60 L40 70" />
				</svg>
			</div>

			<div class="title">TESSERACT</div>

			<div class="loader"></div>

			<div class="loading-text">LOADING...</div>
		</div>
	</body>
</html>
